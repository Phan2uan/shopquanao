services:

  postgres:
    image: postgres:16
    container_name: postgres_shop

    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shop"]
      interval: 10s
      timeout: 5s
      retries: 5

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - shop_network



  app:
    image: phan2uan/shopquanao:latest
    container_name: shop_app

    depends_on:
      postgres:
        condition: service_healthy

    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}

    restart: always

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - shop_network



  nginx:
    image: nginx:latest
    container_name: nginx_proxy

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt

    depends_on:
      - app

    restart: always

    logging:
      options:
        max-size: "10m"
        max-file: "3"

    networks:
      - shop_network



networks:
  shop_network:
    driver: bridge



volumes:
  postgres_data: