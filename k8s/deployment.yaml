apiVersion: apps/v1
kind: Deployment

metadata:
  name: shop-app-deployment

spec:
  replicas: 2

  selector:
    matchLabels:
      app: shop-app

  template:
    metadata:
      labels:
        app: shop-app

    spec:
      containers:
        - name: shop-app

          image: phan2uan/shopquanao:latest

          ports:
            - containerPort: 8080

          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: shop-config
                  key: SPRING_DATASOURCE_URL

            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: shop-config
                  key: SPRING_DATASOURCE_USERNAME

            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: shop-secret
                  key: SPRING_DATASOURCE_PASSWORD