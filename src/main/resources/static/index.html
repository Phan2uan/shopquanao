<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Quần Áo - Modern Admin</title>
    <!-- Modern Font -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Separate CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container" id="app">
        <header>
            <h1>SHOP QUẦN ÁO</h1>
            <p>Hệ thống Quản lý Demo • Spring Boot API • Premium UI</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showSection('products')">Sản phẩm</button>
            <button class="tab-btn" onclick="showSection('add-product')">Thêm mới</button>
            <button class="tab-btn" onclick="showSection('auth')">Tài khoản</button>
        </div>

        <!-- Section: Product List -->
        <section id="products" class="section active">
            <div class="filter-bar">
                <input type="text" id="nameFilter" placeholder="Tìm theo tên sản phẩm...">
                <input type="number" id="minPrice" placeholder="Giá từ">
                <input type="number" id="maxPrice" placeholder="Đến giá">
                <button class="btn-action" onclick="fetchProducts()">Lọc kết quả</button>
            </div>
            
            <div class="grid" id="productGrid">
                <!-- Data injected by app.js -->
            </div>
        </section>

        <!-- Section: Add Product -->
        <section id="add-product" class="section">
            <div class="auth-container">
                <h2 style="margin-bottom: 25px; text-align: center;">Thêm Sản Phẩm</h2>
                <div class="form-group">
                    <label>Tên sản phẩm</label>
                    <input type="text" id="pName" placeholder="Áo thun Polo...">
                </div>
                <div class="form-group">
                    <label>Loại sản phẩm</label>
                    <input type="text" id="pType" placeholder="T-Shirt, Jeans...">
                </div>
                <div class="form-group">
                    <label>Giá niêm yết (đ)</label>
                    <input type="number" id="pPrice" placeholder="Ví dụ: 250000">
                </div>
                <div class="form-group">
                    <label>Số lượng kho</label>
                    <input type="number" id="pQty" placeholder="0">
                </div>
                <button class="btn-action" style="width: 100%" onclick="addProduct()">Tạo sản phẩm</button>
            </div>
        </section>

        <!-- Section: Authentication -->
        <section id="auth" class="section">
            <div class="auth-container">
                <!-- Login Form -->
                <div id="loginForm">
                    <h2 style="margin-bottom: 25px; text-align: center;">Đăng Nhập</h2>
                    <div class="form-group">
                        <label>Tên tài khoản</label>
                        <input type="text" id="loginUser" placeholder="Nhập username">
                    </div>
                    <div class="form-group">
                        <label>Mật khẩu</label>
                        <input type="password" id="loginPass" placeholder="••••••••">
                    </div>
                    <button class="btn-action" style="width: 100%" onclick="login()">Đăng nhập ngay</button>
                    <p style="margin-top: 20px; text-align: center; color: #94a3b8; font-size: 0.9rem;">
                        Chưa có tài khoản? 
                        <span style="color: var(--primary); cursor: pointer; font-weight: 600;" onclick="toggleAuth()">Đăng ký</span>
                    </p>
                </div>

                <!-- Register Form -->
                <div id="registerForm" style="display: none;">
                    <h2 style="margin-bottom: 25px; text-align: center;">Tạo Tài Khoản</h2>
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="regUser" placeholder="Tên đăng nhập">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="regPass" placeholder="Mật khẩu bảo mật">
                    </div>
                    <div class="form-group">
                        <label>Họ tên đầy đủ</label>
                        <input type="text" id="regName" placeholder="Ví dụ: Nguyễn Văn A">
                    </div>
                    <button class="btn-action" style="width: 100%" onclick="register()">Đăng ký thành viên</button>
                    <p style="margin-top: 20px; text-align: center; color: #94a3b8; font-size: 0.9rem;">
                        Đã có tài khoản? 
                        <span style="color: var(--primary); cursor: pointer; font-weight: 600;" onclick="toggleAuth()">Quay lại đăng nhập</span>
                    </p>
                </div>
            </div>
        </section>
    </div>

    <!-- Notification system -->
    <div id="toast">Thông báo hệ thống</div>

    <!-- Logic Script -->
    <script src="app.js"></script>
</body>
</html>
