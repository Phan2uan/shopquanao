<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phan2uanShop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style cho modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 12px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #48bb78; color: white; }
        .btn-danger { background: #f56565; color: white; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .filter-controls input {
            flex: 1;
            min-width: 150px;
        }
        .hero-banner {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            color: white;
            text-align: center;
        }
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .filter-controls {
                flex-direction: column;
            }
            .filter-controls input, .filter-controls button {
                width: 100%;
            }
            .form-grid {
                grid-template-columns: 1fr;
            }
            .hero-banner {
                padding: 20px;
            }
            .hero-banner h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
<div class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <!-- Header -->
    <div class="header">
        <h1 id="shopTitle">🛍️ Phan2uanShop</h1>
        <div>
            <button id="showRegisterBtn" class="btn btn-success">Đăng ký</button>
            <button id="showLoginBtn" class="btn btn-primary">Đăng nhập</button>
            <button id="logoutBtn" class="btn btn-danger" style="display: none;">Đăng xuất</button>
        </div>
    </div>

    <!-- Hero Banner -->
    <div class="hero-banner">
        <h1>🛍️ Summer Sale 2024</h1>
        <p>Giảm giá lên đến 50% cho tất cả sản phẩm | Miễn phí vận chuyển</p>
    </div>

    <!-- Form thêm sản phẩm - CHỈ ADMIN MỚI THẤY -->
    <div id="addProductForm" style="background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: none;">
        <h2>➕ Thêm sản phẩm mới</h2>
        <div class="form-grid">
            <input type="text" id="productName" placeholder="Tên sản phẩm">
            <input type="text" id="productType" placeholder="Loại sản phẩm">
            <input type="number" id="productPrice" placeholder="Giá (VNĐ)">
            <input type="number" id="productQuantity" placeholder="Số lượng">
            <input type="text" id="productSize" placeholder="Size (S, M, L, XL)">
            <input type="text" id="productColor" placeholder="Màu sắc">
            <button id="addProductBtn" class="btn btn-success">➕ Thêm sản phẩm</button>
        </div>
    </div>

    <!-- Modal Đăng ký -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>Đăng ký tài khoản</h2>

            <label for="regUsername">Tên đăng nhập *</label>
            <input type="text" id="regUsername" placeholder="Nhập tên đăng nhập">

            <label for="regEmail">Email *</label>
            <input type="email" id="regEmail" placeholder="Nhập email">

            <label for="regPassword">Mật khẩu *</label>
            <input type="password" id="regPassword" placeholder="Nhập mật khẩu">

            <label for="regConfirmPassword">Xác nhận mật khẩu *</label>
            <input type="password" id="regConfirmPassword" placeholder="Nhập lại mật khẩu">

            <label for="regName">Họ và tên *</label>
            <input type="text" id="regName" placeholder="Nhập họ và tên">

            <label for="regBirthDate">Ngày sinh</label>
            <input type="date" id="regBirthDate">

            <label for="regGender">Giới tính</label>
            <select id="regGender">
                <option value="">Chọn giới tính</option>
                <option value="male">Nam</option>
                <option value="female">Nữ</option>
                <option value="other">Khác</option>
            </select>

            <button id="submitRegisterBtn" class="btn btn-success" style="width: 100%; margin-top: 15px;">Đăng ký</button>
            <button id="closeRegisterModal" class="btn" style="width: 100%; margin-top: 10px; background: #ccc;">Đóng</button>
        </div>
    </div>

    <!-- Modal Đăng nhập -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Đăng nhập</h2>
            <label for="loginUsername">Tên đăng nhập</label>
            <input type="text" id="loginUsername" placeholder="Nhập tên đăng nhập">

            <label for="loginPassword">Mật khẩu</label>
            <input type="password" id="loginPassword" placeholder="Nhập mật khẩu">

            <button id="submitLoginBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Đăng nhập</button>
            <button id="closeLoginModal" class="btn" style="width: 100%; margin-top: 10px; background: #ccc;">Đóng</button>
        </div>
    </div>

    <!-- Modal Chỉnh sửa Sản phẩm -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Chỉnh sửa sản phẩm</h2>
            <input type="hidden" id="editProductId">

            <label for="editProductName">Tên sản phẩm *</label>
            <input type="text" id="editProductName" placeholder="Nhập tên sản phẩm">

            <label for="editProductType">Loại sản phẩm</label>
            <input type="text" id="editProductType" placeholder="Nhập loại sản phẩm">

            <label for="editProductPrice">Giá *</label>
            <input type="number" id="editProductPrice" placeholder="Nhập giá">

            <label for="editProductQuantity">Số lượng *</label>
            <input type="number" id="editProductQuantity" placeholder="Nhập số lượng">

            <label for="editProductSize">Size</label>
            <input type="text" id="editProductSize" placeholder="Size (S, M, L, XL)">

            <label for="editProductColor">Màu sắc</label>
            <input type="text" id="editProductColor" placeholder="Màu sắc">

            <button id="submitEditBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Cập nhật sản phẩm</button>
            <button id="closeEditModal" class="btn" style="width: 100%; margin-top: 10px; background: #ccc;">Đóng</button>
        </div>
    </div>

    <!-- Bộ lọc sản phẩm -->
    <div style="background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h2>🔍 Lọc sản phẩm</h2>
        <div class="filter-controls">
            <input type="text" id="filterName" placeholder="Tìm theo tên">
            <input type="number" id="filterMinPrice" placeholder="Giá từ (VNĐ)">
            <input type="number" id="filterMaxPrice" placeholder="Giá đến (VNĐ)">
            <button id="filterBtn" class="btn btn-primary">🔍 Lọc</button>
            <button id="resetFilterBtn" class="btn">🔄 Reset</button>
        </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div>
        <h2>📦 Danh sách sản phẩm</h2>
        <div id="productsContainer" class="products-grid"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
