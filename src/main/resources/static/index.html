<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Shop</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Style cho modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
        }
        .modal-content {
            background: white;
            width: 90%;
            max-width: 400px;
            margin: 50px auto;
            padding: 30px;
            border-radius: 12px;
        }
        .modal-content input, .modal-content select {
            width: 100%;
            margin: 10px 0;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn-primary { background: #667eea; color: white; }
        .btn-success { background: #48bb78; color: white; }
        .btn-danger { background: #f56565; color: white; }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e0e0e0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .product-card {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
        }
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .filter-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
<div class="container" style="max-width: 1200px; margin: 0 auto; padding: 20px;">
    <!-- Header -->
    <div class="header">
        <h1>🏪 Quản lý Cửa hàng</h1>
        <div>
            <button id="showRegisterBtn" class="btn btn-success">Đăng ký</button>
            <button id="showLoginBtn" class="btn btn-primary">Đăng nhập</button>
            <button id="logoutBtn" class="btn btn-danger" style="display: none;">Đăng xuất</button>
        </div>
    </div>

    <!-- Modal Đăng ký -->
    <div id="registerModal" class="modal">
        <div class="modal-content">
            <h2>Đăng ký tài khoản</h2>
            <input type="text" id="regUsername" placeholder="Tên đăng nhập *">
            <input type="password" id="regPassword" placeholder="Mật khẩu *">
            <input type="text" id="regName" placeholder="Họ tên *">
            <input type="date" id="regBirthDate" placeholder="Ngày sinh">
            <select id="regGender">
                <option value="">Chọn giới tính</option>
                <option value="male">Nam</option>
                <option value="female">Nữ</option>
                <option value="other">Khác</option>
            </select>
            <button id="submitRegisterBtn" class="btn btn-success" style="width: 100%;">Đăng ký</button>
            <button id="closeRegisterModal" class="btn" style="width: 100%; margin-top: 10px; background: #ccc;">Đóng</button>
        </div>
    </div>

    <!-- Modal Đăng nhập -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <h2>Đăng nhập</h2>
            <input type="text" id="loginUsername" placeholder="Tên đăng nhập">
            <input type="password" id="loginPassword" placeholder="Mật khẩu">
            <button id="submitLoginBtn" class="btn btn-primary" style="width: 100%;">Đăng nhập</button>
            <button id="closeLoginModal" class="btn" style="width: 100%; margin-top: 10px; background: #ccc;">Đóng</button>
        </div>
    </div>

    <!-- Modal Chỉnh sửa Sản phẩm (ĐÃ SỬA ID) -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <h2>✏️ Chỉnh sửa sản phẩm</h2>

            <input type="hidden" id="editProductId">

            <input type="text" id="editProductName" placeholder="Tên sản phẩm *">
            <input type="text" id="editProductType" placeholder="Loại sản phẩm">
            <input type="number" id="editProductPrice" placeholder="Giá *">
            <input type="number" id="editProductQuantity" placeholder="Số lượng *">
            <input type="text" id="editProductSize" placeholder="Size">
            <input type="text" id="editProductColor" placeholder="Màu sắc">

            <button id="submitEditBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">Cập nhật sản phẩm</button>
            <button id="closeEditModal" class="btn" style="width: 100%; margin-top: 10px; background: #ccc;">Đóng</button>
        </div>
    </div>

    <!-- Form thêm sản phẩm -->
    <div style="background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h2>Thêm sản phẩm mới</h2>
        <div class="form-grid">
            <input type="text" id="productName" placeholder="Tên sản phẩm">
            <input type="text" id="productType" placeholder="Loại">
            <input type="number" id="productPrice" placeholder="Giá">
            <input type="number" id="productQuantity" placeholder="Số lượng">
            <input type="text" id="productSize" placeholder="Size">
            <input type="text" id="productColor" placeholder="Màu sắc">
            <button id="addProductBtn" class="btn btn-success">➕ Thêm sản phẩm</button>
        </div>
    </div>

    <!-- Filter -->
    <div style="background: #f7fafc; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
        <h2>Lọc sản phẩm</h2>
        <div class="filter-controls">
            <input type="text" id="filterName" placeholder="Tìm theo tên">
            <input type="number" id="filterMinPrice" placeholder="Giá từ">
            <input type="number" id="filterMaxPrice" placeholder="Giá đến">
            <button id="filterBtn" class="btn btn-primary">🔍 Lọc</button>
            <button id="resetFilterBtn" class="btn">🔄 Reset</button>
        </div>
    </div>

    <!-- Danh sách sản phẩm -->
    <div>
        <h2>📦 Danh sách sản phẩm</h2>
        <div id="productsContainer" class="products-grid"></div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
