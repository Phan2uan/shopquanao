name: Deploy Spring Boot App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      VERSION: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build Spring Boot
        run: mvn clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🔥 BUILD IMAGE
      - name: Build Docker image
        run: |
          docker build -t phan2uan/shopquanao:${VERSION} .
          docker tag phan2uan/shopquanao:${VERSION} phan2uan/shopquanao:latest

      # 🔥 PUSH BOTH TAGS
      - name: Push Docker image
        run: |
          docker push phan2uan/shopquanao:${VERSION}
          docker push phan2uan/shopquanao:latest

      # 🚀 DEPLOY TO VM
      - name: Deploy to VM
        uses: appleboy/ssh-action@master

        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}

          script: |
            cd ~/shopquanao

            sudo docker pull phan2uan/shopquanao:${VERSION}

            sudo docker tag phan2uan/shopquanao:${VERSION} phan2uan/shopquanao:latest

            sudo docker compose up -d --remove-orphans